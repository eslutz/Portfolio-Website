<div class="container">
  <h2 class="heading-secondary">Certifications</h2>
  <ul class="list">
    @for (cert of certifications(); track cert.id) {
      <li class="list-item" [class.u-margin-bottom-sm]="!$last">
        <ul class="list">
          <li class="list-item">
            <p>
              <strong>{{ cert.title }}</strong> &mdash; {{ cert.description }}
            </p>
          </li>
          <li class="list-item">
            <small>
              <em>Earned {{ cert.earned }}</em>
              @if (cert.expires) {
                <span>, <em>Expires {{ cert.expires }}</em></span>
              }
            </small>
          </li>
          <li class="list-item">
            @if (cert.link) {
              <a
                class="link"
                [href]="cert.link"
                target="_blank"
                rel="noopener noreferrer">
                View Certificate
                <i
                  class="fa-solid fa-arrow-up-right-from-square left-padding--xs"></i>
              </a>
            }
          </li>
        </ul>
      </li>
    }
  </ul>
</div>
