@if (state().loading) {
  <p class="container loading" role="status" aria-live="polite">Loading</p>
} @else if (state().error) {
  <h1 class="visually-hidden">Home</h1>
  <p class="container loading-error" role="alert">{{ state().error }}</p>
} @else {
  @if (state().home; as home) {
    <header class="home-hero light-bg">
      <div class="home-hero__inner">
        <h1 class="heading-primary home-title">{{ home.title }}</h1>
        @if (home.subtitle) {
          <p class="home-subtitle">{{ home.subtitle }}</p>
        }
      </div>
    </header>
    <section class="about" id="about">
      <div class="container">
        <div class="home-content" [innerHTML]="home.content"></div>
      </div>
    </section>
  }
}
