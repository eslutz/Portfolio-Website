<p class="project-description">
  <i class="fa-solid fa-angles-right"></i>
  <strong class="left-padding--xs">{{ project().title }}</strong>
</p>
<ul class="list">
  <li class="list-item">
    <p class="project-description" [innerHTML]="project().description"></p>
  </li>
  @if (project().imageSrc) {
    <li class="list-item">
      <img
        class="project-image image-shadow"
        [src]="project().imageSrc"
        [alt]="project().title + ' image'"
        loading="lazy" />
    </li>
  }
  @if (project().videoSrc) {
    <li class="list-item">
      <video class="project-image" controls preload="none">
        <source [src]="project().videoSrc" />
      </video>
    </li>
  }
  @if (project().demoLink) {
    <li class="list-item">
      <a
        class="link"
        [href]="project().demoLink"
        target="_blank"
        rel="noopener noreferrer">
        {{ project().demoLinkText || 'View Project' }}
        <i class="fa-solid fa-arrow-up-right-from-square left-padding--xs"></i>
      </a>
    </li>
  }
  <li class="list-item">
    <div>
      <i class="fa-brands fa-github"></i>:
      <a
        class="link"
        [href]="project().codeLink"
        target="_blank"
        rel="noopener noreferrer">
        Code
        <i class="fa-solid fa-arrow-up-right-from-square left-padding--xs"></i>
      </a>
    </div>
  </li>
</ul>
