#########################################################################################
##  DEPLOY PORTFOLIO SITE
#########################################################################################
name: Deploy Portfolio Site

#########################################################################################
##  WORKFLOW TRIGGER
#########################################################################################
on:
  # Manual trigger for on-demand site deployment.
  # Infrastructure uses this event after refreshing SWA_DEPLOYMENT_TOKEN.
  workflow_dispatch:
    inputs:
      source:
        description: Source that requested the site deployment
        required: false
        default: manual
      triggering_run_id:
        description: Upstream workflow run ID, when dispatched by another workflow
        required: false
  # Automatic trigger on push to main branch
  push:
    branches:
      - main
  # Automatic trigger on pull request events to main branch
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

#########################################################################################
##  WORKFLOW CONCURRENCY
#########################################################################################
# Prevents multiple parallel site deploys on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

#########################################################################################
##  WORKFLOW PERMISSIONS
#########################################################################################
permissions:
  contents: read
  pull-requests: write # Required by the SWA deploy action to post PR comments via repo_token

#########################################################################################
##  WORKFLOW JOBS
#########################################################################################
jobs:
  # Detects whether site code changed.
  # workflow_dispatch forces a site deploy because repository secrets are read when the run is queued.
  detect-changes:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Detect Site Changes Job
    outputs:
      iac: ${{ steps.changes.outputs.iac }}
      site: ${{ steps.changes.outputs.site }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "iac=false" >> "$GITHUB_OUTPUT"
            echo "site=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "iac=true" >> "$GITHUB_OUTPUT"
            echo "site=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "$CHANGED"
          echo "iac=$(echo "$CHANGED" | grep -q '^iac/' && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
          echo "site=$(echo "$CHANGED" | grep -vqE '^(iac/|\.github/)' && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"

  # Runs lint, unit tests, and API build to verify code quality before deploying.
  quality:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.site == 'true' &&
      (github.event_name != 'push' || needs.detect-changes.outputs.iac != 'true')
    runs-on: ubuntu-latest
    name: Quality Job
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: '10.x'

      - name: Build API
        run: dotnet build api

  # Builds and deploys the site to the production environment.
  # Pushes that include infrastructure changes are handled by the infrastructure workflow, which dispatches this workflow after refreshing the SWA token.
  deploy-site:
    needs: [detect-changes, quality]
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.quality.result == 'success' &&
      (github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.iac != 'true')
    runs-on: ubuntu-latest
    name: Deploy Site Job
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Build and deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: api
          output_location: dist/portfolio/browser

  # Builds and deploys the site to a pull request preview environment.
  deploy-preview:
    needs: quality
    if: needs.quality.result == 'success' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Deploy PR Preview Job
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Build and deploy preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: api
          output_location: dist/portfolio/browser

  # Tears down the pull request preview environment after the PR is closed.
  close-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Preview Job
    steps:
      - name: Close pull request preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: close
          app_location: /
