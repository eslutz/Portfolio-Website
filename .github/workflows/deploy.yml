#########################################################################################
##  DEPLOY PORTFOLIO SITE
#########################################################################################
name: Deploy Portfolio Site

#########################################################################################
##  WORKFLOW TRIGGER
#########################################################################################
on:
  # Manual trigger for on-demand deployment
  workflow_dispatch:
  # Automatic trigger on push to main branch
  push:
    branches:
      - main
  # Automatic trigger on pull request events to main branch
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

#########################################################################################
##  WORKFLOW CONCURRENCY
#########################################################################################
# Prevents multiple parallel runs of the workflow on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

#########################################################################################
##  WORKFLOW PERMISSIONS
#########################################################################################
permissions:
  contents: read
  pull-requests: write # Required by the SWA deploy action to post PR comments via repo_token

#########################################################################################
##  WORKFLOW JOBS
#########################################################################################
jobs:
  # Detects which parts of the codebase changed to run only the necessary jobs.
  # Skipped on PR close — that event only needs close-preview.
  # workflow_dispatch always sets both outputs to true to force a full deploy.
  detect-changes:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Detect Changes Job
    outputs:
      iac: ${{ steps.changes.outputs.iac }}
      site: ${{ steps.changes.outputs.site }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "iac=true" >> "$GITHUB_OUTPUT"
            echo "site=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "iac=true" >> "$GITHUB_OUTPUT"
            echo "site=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "$CHANGED"
          echo "iac=$(echo "$CHANGED" | grep -q '^iac/' && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
          echo "site=$(echo "$CHANGED" | grep -vqE '^(iac/|\.github/)' && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"

  # Runs lint, unit tests, and API build to verify code quality before deploying
  quality:
    needs: detect-changes
    if: needs.detect-changes.outputs.site == 'true'
    runs-on: ubuntu-latest
    name: Quality Job
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: '8.x'

      - name: Build API
        run: dotnet build api

  # Validates the Bicep template on pull requests without deploying any resources
  validate-infrastructure:
    needs: detect-changes
    if: needs.detect-changes.outputs.iac == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Validate Infrastructure Job
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Azure login
        uses: azure/login@v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate Bicep template
        run: |
          az deployment sub validate \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION }}" \
            --location "${{ vars.AZURE_REGION }}" \
            --template-file ./iac/main.bicep \
            --parameters \
              location=${{ vars.AZURE_REGION }} \
              appName=${{ vars.APP_NAME }} \
              repoUrl=${{ github.server_url }}/${{ github.repository }} \
              repoBranch=${{ github.ref_name }} \
              existingCosmosDbAccountName=${{ vars.COSMOS_ACCOUNT_NAME }} \
              existingCosmosDbResourceGroup=${{ vars.COSMOS_RESOURCE_GROUP }}

  # Deploys the Bicep template to create/update Azure resources on push to main
  deploy-infrastructure:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.iac == 'true' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    name: Deploy Infrastructure Job
    outputs:
      staticWebAppName: ${{ steps.deploy-bicep.outputs.staticWebAppName }}
      resourceGroupName: ${{ steps.deploy-bicep.outputs.resourceGroupName }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Azure login
        uses: azure/login@v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep template
        id: deploy-bicep
        uses: azure/bicep-deploy@v2.3.0
        with:
          type: deployment
          operation: create
          scope: subscription
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION }}
          location: ${{ vars.AZURE_REGION }}
          template-file: ./iac/main.bicep
          parameters: |
            {
              "location": "${{ vars.AZURE_REGION }}",
              "appName": "${{ vars.APP_NAME }}",
              "repoUrl": "${{ github.server_url }}/${{ github.repository }}",
              "repoBranch": "${{ github.ref_name }}",
              "existingCosmosDbAccountName": "${{ vars.COSMOS_ACCOUNT_NAME }}",
              "existingCosmosDbResourceGroup": "${{ vars.COSMOS_RESOURCE_GROUP }}"
            }

  # Retrieves the updated SWA deployment token after an infrastructure deploy and saves it as a repository secret
  save-swa-token:
    needs: deploy-infrastructure
    runs-on: ubuntu-latest
    name: Save SWA Token Job
    steps:
      - name: Azure login
        uses: azure/login@v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get SWA deployment token
        id: get-swa-token
        env:
          SWA_NAME: ${{ needs.deploy-infrastructure.outputs.staticWebAppName }}
          SWA_RESOURCE_GROUP: ${{ needs.deploy-infrastructure.outputs.resourceGroupName }}
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "$SWA_NAME" \
            --resource-group "$SWA_RESOURCE_GROUP" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "swa_token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Save SWA token as repository secret
        env:
          GH_TOKEN: ${{ secrets.REPO_SECRETS_TOKEN }}
          SWA_TOKEN: ${{ steps.get-swa-token.outputs.swa_token }}
        run: |
          gh secret set SWA_DEPLOYMENT_TOKEN --body "$SWA_TOKEN" --repo "${{ github.repository }}"

  # Builds and deploys the site to the production environment on push to main.
  # Runs after quality (if code changed) and after save-swa-token (if infrastructure changed),
  # waiting for both when both ran. Skipped if neither produced a success.
  deploy-site:
    needs: [quality, deploy-infrastructure, save-swa-token]
    if: |
      always() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (needs.quality.result == 'success' || needs.quality.result == 'skipped') &&
      (needs.deploy-infrastructure.result == 'success' || needs.deploy-infrastructure.result == 'skipped') &&
      (needs.save-swa-token.result == 'success' || needs.save-swa-token.result == 'skipped') &&
      (needs.quality.result == 'success' || needs.save-swa-token.result == 'success')
    runs-on: ubuntu-latest
    name: Deploy Site Job
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Build and deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: api
          output_location: dist/portfolio/browser

  # Builds and deploys the site to a pull request preview environment
  deploy-preview:
    needs: quality
    if: needs.quality.result == 'success' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Deploy PR Preview Job
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Build and deploy preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: api
          output_location: dist/portfolio/browser

  # Tears down the pull request preview environment after the PR is closed
  close-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Preview Job
    steps:
      - name: Close pull request preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: close
          app_location: /
