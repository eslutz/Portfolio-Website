#########################################################################################
##  DEPLOY PORTFOLIO INFRASTRUCTURE
#########################################################################################
name: Deploy Portfolio Infrastructure

#########################################################################################
##  WORKFLOW TRIGGER
#########################################################################################
on:
  # Manual trigger for on-demand production infrastructure deployment and site redeploy.
  # This workflow is guarded so workflow_dispatch only deploys from main.
  workflow_dispatch:
  # Automatic trigger on push to main branch
  push:
    branches:
      - main
  # Automatic infrastructure validation on pull request events to main branch
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

#########################################################################################
##  WORKFLOW CONCURRENCY
#########################################################################################
# Prevents multiple parallel infrastructure runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

#########################################################################################
##  WORKFLOW PERMISSIONS
#########################################################################################
permissions:
  contents: read
  actions: write # Required to dispatch the site deployment workflow after infra completes

#########################################################################################
##  WORKFLOW JOBS
#########################################################################################
jobs:
  # Detects whether infrastructure changed. workflow_dispatch forces infra deployment.
  detect-changes:
    runs-on: ubuntu-latest
    name: Detect Infrastructure Changes Job
    outputs:
      iac: ${{ steps.changes.outputs.iac }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "iac=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "iac=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "$CHANGED"
          echo "iac=$(echo "$CHANGED" | grep -q '^iac/' && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"

  # Validates the Bicep template on pull requests without deploying any resources.
  validate-infrastructure:
    needs: detect-changes
    if: needs.detect-changes.outputs.iac == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Validate Infrastructure Job
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Azure login
        uses: azure/login@v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Validate Bicep template
        run: |
          az deployment sub validate \
            --subscription "${{ secrets.AZURE_SUBSCRIPTION }}" \
            --location "${{ vars.AZURE_REGION }}" \
            --template-file ./iac/main.bicep \
            --parameters \
              location=${{ vars.AZURE_REGION }} \
              appName=${{ vars.PROD_APP_NAME }} \
              repoUrl=${{ github.server_url }}/${{ github.repository }} \
              repoBranch=${{ github.ref_name }} \
              existingCosmosDbAccountName=${{ vars.COSMOS_ACCOUNT_NAME }} \
              existingCosmosDbResourceGroup=${{ vars.COSMOS_RESOURCE_GROUP }}

  # Deploys the Bicep template to create/update Azure resources on push to main.
  deploy-infrastructure:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.iac == 'true' &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref_name == 'main'))
    runs-on: ubuntu-latest
    name: Deploy Infrastructure Job
    outputs:
      staticWebAppName: ${{ steps.deploy-bicep.outputs.staticWebAppName }}
      resourceGroupName: ${{ steps.deploy-bicep.outputs.resourceGroupName }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Azure login
        uses: azure/login@v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep template
        id: deploy-bicep
        uses: azure/bicep-deploy@v2.3.0
        with:
          type: deployment
          operation: create
          scope: subscription
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION }}
          location: ${{ vars.AZURE_REGION }}
          template-file: ./iac/main.bicep
          parameters: |
            {
              "location": "${{ vars.AZURE_REGION }}",
              "appName": "${{ vars.PROD_APP_NAME }}",
              "repoUrl": "${{ github.server_url }}/${{ github.repository }}",
              "repoBranch": "${{ github.ref_name }}",
              "existingCosmosDbAccountName": "${{ vars.COSMOS_ACCOUNT_NAME }}",
              "existingCosmosDbResourceGroup": "${{ vars.COSMOS_RESOURCE_GROUP }}"
            }

  # Refreshes the production SWA deployment token after infra deployment, then queues site deploy separately.
  save-swa-token-and-dispatch-site:
    needs: deploy-infrastructure
    runs-on: ubuntu-latest
    name: Save SWA Token and Dispatch Site Job
    steps:
      - name: Azure login
        uses: azure/login@v3.0.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get SWA deployment token
        id: get-swa-token
        env:
          SWA_NAME: ${{ needs.deploy-infrastructure.outputs.staticWebAppName }}
          SWA_RESOURCE_GROUP: ${{ needs.deploy-infrastructure.outputs.resourceGroupName }}
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name "$SWA_NAME" \
            --resource-group "$SWA_RESOURCE_GROUP" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::$TOKEN"
          echo "swa_token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Save SWA token as repository secret
        env:
          GH_TOKEN: ${{ secrets.REPO_SECRETS_TOKEN }}
          SWA_TOKEN: ${{ steps.get-swa-token.outputs.swa_token }}
        run: |
          gh secret set PROD_SWA_DEPLOYMENT_TOKEN --body "$SWA_TOKEN" --repo "${{ github.repository }}"

      - name: Dispatch site deployment workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run deploy-site.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}" \
            -f source="infrastructure" \
            -f triggering_run_id="${{ github.run_id }}"
